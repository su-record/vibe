name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check version change
        id: version
        run: |
          LOCAL_VER=$(node -p "require('./package.json').version")
          PUBLISHED_VER=$(npm view @su-record/core version --registry https://npm.pkg.github.com 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VER" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED_VER" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VER" = "$PUBLISHED_VER" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@su-record"

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install

      - name: Publish
        if: steps.version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Publishing ${{ steps.version.outputs.local }} (was ${{ steps.version.outputs.published }})"
          npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
