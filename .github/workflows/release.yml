name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # GitHub Release 생성
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24' # npm >= 11.5 — OIDC trusted publishing 요구사항
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build (tsc)
        run: pnpm build

      - name: Run vitest
        run: pnpm test -- --reporter=default

      - name: Generate release notes
        run: node dist/cli/generate-release-notes.js "$GITHUB_REF_NAME" release-notes.md

      - name: Publish to npm (OIDC trusted publishing — 토큰 없음)
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
