name: "🐛 버그 리포트 / Bug Report"
description: "vibe가 기대와 다르게 동작할 때 / When vibe doesn't behave as expected"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > 1인 사이드 프로젝트입니다. 응답은 보통 **주 단위**로 드립니다 — self-test 리포트가 첨부된 이슈부터 봅니다.
        > This is a solo side project. Responses are usually **weekly** — issues with a self-test report attached get looked at first.

  - type: input
    id: version
    attributes:
      label: "vibe 버전 / Version"
      description: "`vibe --version` 또는 `npm ls -g @su-record/vibe`"
      placeholder: "3.0.0"
    validations:
      required: true

  - type: dropdown
    id: harness
    attributes:
      label: "하네스 / Harness"
      multiple: true
      options:
        - Claude Code
        - Codex
        - Cursor
        - Antigravity CLI
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: "환경 / Environment"
      description: "OS + Node 버전 (`node -v`)"
      placeholder: "macOS 15.2 / Node 22.11"
    validations:
      required: true

  - type: textarea
    id: selftest
    attributes:
      label: "self-test 리포트 / Self-test report"
      description: |
        Claude Code 또는 Codex에서 `/vibe.test`(또는 `$vibe.test`)를 실행하면 `~/.vibe/test-reports/`에 리포트가 생성됩니다.
        최신 `.md` 리포트 내용을 붙여넣어 주세요 — 환경 문제의 80%는 이걸로 재현 없이 진단됩니다.
        실행이 불가능한 상황(설치 실패 등)이면 "실행 불가"라고 적고 설치 로그를 붙여주세요.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "재현 절차 / Steps to reproduce"
      description: "실행한 명령과 순서. 가능하면 최소 재현으로."
      placeholder: |
        1. vibe init (typescript-react 프로젝트)
        2. /vibe "로그인 폼 추가"
        3. SPEC 승인 후 …
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: "기대 동작 vs 실제 동작 / Expected vs Actual"
      placeholder: |
        기대: verify 통과 후 auto-commit
        실제: verify 통과했는데 commit이 차단됨 (run-ledger 내용 첨부)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "영역 / Area"
      options:
        - hooks (편집/커밋/PR 게이트)
        - skills (/vibe.* 워크플로)
        - agents (서브에이전트)
        - install / postinstall / update
        - v2 → v3 마이그레이션
        - figma / design
        - memory / regress
        - 기타
    validations:
      required: true
